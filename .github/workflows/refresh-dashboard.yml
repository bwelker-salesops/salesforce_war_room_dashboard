name: Refresh Dashboard Data

on:
  schedule:
    # 9:00 AM ET (13:00 UTC) on weekdays. During EDT (Mar-Nov) this fires at 9am;
    # during EST (Nov-Mar) it fires at 8am ET — close enough for a dashboard refresh.
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull Salesforce reports and rebuild index.html
        env:
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
        run: python refresh_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: refresh dashboard data $(date -u +%Y-%m-%d)"
          git push
